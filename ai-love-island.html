<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Love Island - Pixel Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
        }
        
        body {
            background: #0f0f23;
            font-family: 'Press Start 2P', cursive;
            color: #00ff41;
            min-height: 100vh;
            padding: 20px;
            font-size: 8px;
            line-height: 1.8;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 20px;
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41, 0 0 10px #00ff41;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 10px;
            color: #ff1493;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .pixel-card {
            background: #1a1a2e;
            border: 4px solid #00ff41;
            box-shadow: 0 0 0 2px #0f0f23, 0 0 0 6px #00ff41, 8px 8px 0 0 rgba(0,255,65,0.3);
            padding: 15px;
        }
        
        .gossip-feed {
            min-height: 400px;
        }
        
        .day {
            font-size: 14px;
            color: #ffd700;
            margin-bottom: 15px;
        }
        
        .gossip-item {
            padding: 10px;
            margin-bottom: 8px;
            border-left: 4px solid;
            font-size: 9px;
        }
        
        .gossip-rejection {
            background: #2d0a0a;
            border-color: #ff0000;
            color: #ff6666;
        }
        
        .gossip-date {
            background: #0a2d0a;
            border-color: #00ff00;
            color: #66ff66;
        }
        
        .gossip-relationship {
            background: #2d0a2d;
            border-color: #ff1493;
            color: #ff69b4;
        }
        
        .gossip-rumor {
            background: #1a1a2e;
            border-color: #9370db;
            color: #ba9bff;
        }
        
        .pixel-button {
            width: 100%;
            background: #00ff41;
            color: #0f0f23;
            border: 4px solid #00ff41;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 0 0 2px #0f0f23, 0 0 0 6px #00ff41, 4px 4px 0 0 rgba(0,255,65,0.5);
            transition: all 0.1s;
        }
        
        .pixel-button:hover {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 2px #0f0f23, 0 0 0 6px #00ff41, 2px 2px 0 0 rgba(0,255,65,0.5);
        }
        
        .pixel-button:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 2px #0f0f23, 0 0 0 6px #00ff41;
        }
        
        .section-title {
            font-size: 12px;
            margin-bottom: 12px;
            color: #00bfff;
            text-shadow: 0 0 5px #00bfff;
        }
        
        .npc-list {
            font-size: 9px;
        }
        
        .npc-item {
            padding: 8px;
            margin-bottom: 6px;
            background: #0a1a2d;
            border: 2px solid #00bfff;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .npc-item:hover {
            background: #00bfff;
            color: #0f0f23;
        }
        
        .ranking-item {
            padding: 8px;
            margin-bottom: 6px;
            background: #1a1a2e;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            font-size: 9px;
        }
        
        .rank-number {
            font-size: 12px;
            color: #ffd700;
            width: 30px;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <div class="header">
            <h1>[ AI LOVE ISLAND ]</h1>
            <p class="subtitle">&gt; OBSERVE THE CITY'S DATING DRAMA_</p>
        </div>
        
        <div class="grid">
            <div class="gossip-feed pixel-card">
                <div class="section-title">[ CITY GOSSIP FEED ]</div>
                <div class="day" id="day-display">&gt; DAY 01</div>
                <div id="gossip-container"></div>
                <button class="pixel-button" id="next-day-btn">[ NEXT DAY &gt;&gt; ]</button>
            </div>
            
            <div>
                <div class="pixel-card" style="margin-bottom: 20px;">
                    <div class="section-title">[ MOST DESIRED ]</div>
                    <div id="ranking-container" class="npc-list"></div>
                </div>
                
                <div class="pixel-card">
                    <div class="section-title">[ RESIDENTS ]</div>
                    <div id="npc-container" class="npc-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Game State
        let day = 1;
        let npcs = [];
        let gossip = [];
        const dateHistory = new Map();
        
        // Initialize NPCs
        function initNPCs() {
            const maleNames = ['Liam', 'Ethan', 'Lucas', 'Daniel', 'Jack', 'Tom'];
            const femaleNames = ['Emma', 'Sophia', 'Olivia', 'Ava', 'Chloe', 'Mia'];
            
            const strategies = {
                male: ['aim_high', 'loyal', 'multi_dating', 'cautious', 'risk_taker', 'flexible'],
                female: ['high_standard', 'mysterious', 'social', 'open', 'rational', 'slow_burn']
            };
            
            maleNames.forEach((name, i) => {
                npcs.push({
                    name,
                    gender: 'male',
                    social_value: Math.floor(Math.random() * 60) + 30,
                    strategy: strategies.male[i],
                    dating: false,
                    partner: null,
                    invites: 0,
                    dates: 0
                });
            });
            
            femaleNames.forEach((name, i) => {
                npcs.push({
                    name,
                    gender: 'female',
                    social_value: Math.floor(Math.random() * 60) + 30,
                    strategy: strategies.female[i],
                    dating: false,
                    partner: null,
                    invites: 0,
                    dates: 0
                });
            });
        }
        
        // Simulation
        function simulateDay() {
            const dayGossip = [];
            const shuffled = [...npcs].sort(() => Math.random() - 0.5);
            
            for (const npc of shuffled) {
                if (npc.dating && npc.strategy === 'loyal') continue;
                
                const targets = npcs.filter(n => n.gender !== npc.gender && n.name !== npc.name);
                if (targets.length === 0) continue;
                
                let target = null;
                for (let i = 0; i < 5; i++) {
                    const candidate = targets[Math.floor(Math.random() * targets.length)];
                    const gap = Math.abs(npc.social_value - candidate.social_value);
                    const prob = Math.exp(-gap / 20);
                    if (Math.random() < prob) {
                        target = candidate;
                        break;
                    }
                }
                
                if (!target) continue;
                
                target.invites++;
                
                const gap = Math.abs(npc.social_value - target.social_value);
                const acceptProb = Math.exp(-gap / 15) * (target.dating ? 0.2 : 1);
                
                if (Math.random() < acceptProb) {
                    npc.dates++;
                    target.dates++;
                    dayGossip.push({
                        type: 'date',
                        text: `&gt; ${npc.name} and ${target.name} had dinner.`
                    });
                    
                    const key = [npc.name, target.name].sort().join('-');
                    const count = (dateHistory.get(key) || 0) + 1;
                    dateHistory.set(key, count);
                    
                    if (count >= 2 && !npc.dating && !target.dating) {
                        npc.dating = true;
                        npc.partner = target.name;
                        target.dating = true;
                        target.partner = npc.name;
                        dayGossip.push({
                            type: 'relationship',
                            text: `&gt; ${npc.name} and ${target.name} are now dating! &lt;3`
                        });
                    }
                } else {
                    dayGossip.push({
                        type: 'rejection',
                        text: `&gt; ${target.name} rejected ${npc.name}.`
                    });
                }
            }
            
            if (Math.random() > 0.7) {
                const singles = npcs.filter(n => !n.dating);
                if (singles.length >= 2) {
                    const npc1 = singles[Math.floor(Math.random() * singles.length)];
                    const opposite = singles.filter(n => n.gender !== npc1.gender);
                    if (opposite.length > 0) {
                        const npc2 = opposite[Math.floor(Math.random() * opposite.length)];
                        dayGossip.push({
                            type: 'rumor',
                            text: `&gt; Rumor: ${npc1.name} might like ${npc2.name}.`
                        });
                    }
                }
            }
            
            gossip = dayGossip;
        }
        
        // Render
        function render() {
            document.getElementById('day-display').textContent = `> DAY ${day.toString().padStart(2, '0')}`;
            
            const gossipContainer = document.getElementById('gossip-container');
            gossipContainer.innerHTML = gossip.map(g => {
                const className = `gossip-${g.type}`;
                return `<div class="gossip-item ${className}">${g.text}</div>`;
            }).join('');
            
            const ranked = [...npcs].sort((a, b) => {
                const scoreA = a.invites * 2 + a.dates * 3;
                const scoreB = b.invites * 2 + b.dates * 3;
                return scoreB - scoreA;
            }).slice(0, 6);
            
            const rankingContainer = document.getElementById('ranking-container');
            rankingContainer.innerHTML = ranked.map((npc, i) => {
                return `
                    <div class="ranking-item">
                        <div class="rank-number">${(i + 1).toString().padStart(2, '0')}</div>
                        <div style="flex: 1;">
                            <div>${npc.name.toUpperCase()}</div>
                            <div style="color: #666; font-size: 7px;">${npc.invites}INV / ${npc.dates}DATE</div>
                        </div>
                        ${npc.dating ? '<span style="color: #ff1493;">&lt;3</span>' : ''}
                    </div>
                `;
            }).join('');
            
            const males = npcs.filter(n => n.gender === 'male');
            const females = npcs.filter(n => n.gender === 'female');
            
            const npcContainer = document.getElementById('npc-container');
            npcContainer.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <div style="color: #00bfff; margin-bottom: 8px;">&gt; MALE</div>
                    ${males.map(npc => `
                        <div class="npc-item">
                            ${npc.name.toUpperCase()} 
                            ${npc.dating ? `&lt;3 ${npc.partner.toUpperCase()}` : ''}
                        </div>
                    `).join('')}
                </div>
                <div>
                    <div style="color: #ff1493; margin-bottom: 8px;">&gt; FEMALE</div>
                    ${females.map(npc => `
                        <div class="npc-item">
                            ${npc.name.toUpperCase()} 
                            ${npc.dating ? `&lt;3 ${npc.partner.toUpperCase()}` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
            
            if (day >= 30) {
                document.getElementById('next-day-btn').textContent = '[ GAME OVER ]';
                document.getElementById('next-day-btn').disabled = true;
                document.getElementById('next-day-btn').style.opacity = '0.5';
            }
        }
        
        // Next Day
        document.getElementById('next-day-btn').addEventListener('click', () => {
            if (day >= 30) return;
            day++;
            simulateDay();
            render();
        });
        
        // Initialize
        initNPCs();
        simulateDay();
        render();
    </script>
</body>
</html>
